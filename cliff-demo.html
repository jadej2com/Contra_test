<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Cliff Face Demo</title>
<style>body{margin:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh}
canvas{image-rendering:pixelated;width:960px;height:540px}</style>
</head><body>
<canvas id="c" width="960" height="540"></canvas>
<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
const S = 3;
const W = 960, H = 540;

function C(r,g,b,a){return a!==undefined?`rgba(${r|0},${g|0},${b|0},${a})`:`rgb(${r|0},${g|0},${b|0})`}

function draw(offset){
  ctx.clearRect(0,0,W,H);

  // Sky
  const grad = ctx.createLinearGradient(0,0,0,260);
  grad.addColorStop(0,C(100,150,220));
  grad.addColorStop(1,C(170,200,240));
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,260);

  // ── Cliff Face ──
  const CT = 200;  // base top
  const CB = 480;  // bottom
  const wOff = Math.floor(offset);

  // 1. Generate column definitions for the visible width
  const cols = [];
  let cx = -20;
  while(cx < W + 20){
    const w = 8 + Math.floor(Math.sin(cx * 0.017 + 0.5) * 6 + Math.sin(cx * 0.05) * 4);
    // Top edge height varies per column
    const peak = Math.sin(cx * 0.012 + 0.3) * 25
               + Math.sin(cx * 0.027 + 1.2) * 15
               + Math.sin(cx * 0.05 + 2.8) * 8;
    const topY = CT + peak;
    // Rock shade: varies by position
    const shade = Math.sin(cx * 0.02 + 0.7) * 0.15
                + Math.sin(cx * 0.005 + 1.3) * 0.1;
    cols.push({x:cx, w, topY, shade});
    cx += w;
  }

  // 2. Background rock layer (darker, wider)
  for(let c of cols){
    const r = 80 + Math.floor(c.shade * 30);
    const g = 50 + Math.floor(c.shade * 20);
    const b = 25 + Math.floor(c.shade * 10);
    ctx.fillStyle = C(r,g,b);
    ctx.fillRect(c.x - 4, c.topY - 10, c.w + 8, CB - c.topY + 10);
  }

  // 3. Main rock columns with 3-tone shading
  for(let c of cols){
    const baseR = 140 + Math.floor(c.shade * 30);
    const baseG = 85 + Math.floor(c.shade * 20);
    const baseB = 38 + Math.floor(c.shade * 12);
    const h = CB - c.topY;

    // Shadow (left 30%)
    ctx.fillStyle = C(baseR - 40, baseG - 25, baseB - 12);
    ctx.fillRect(c.x, c.topY, Math.ceil(c.w * 0.3), h);
    // Highlight (right 20%)
    ctx.fillStyle = C(baseR + 30, baseG + 20, baseB + 10);
    ctx.fillRect(c.x + c.w - Math.ceil(c.w * 0.2), c.topY, Math.ceil(c.w * 0.2), h);
    // Mid (center)
    ctx.fillStyle = C(baseR, baseG, baseB);
    ctx.fillRect(c.x + Math.ceil(c.w * 0.3), c.topY, c.w - Math.ceil(c.w * 0.5), h);

    // Vertical cracks in some columns
    if(Math.sin(c.x * 0.08) > 0.6){
      ctx.fillStyle = C(baseR - 50, baseG - 30, baseB - 15);
      const crkX = c.x + c.w * 0.4 + Math.sin(c.x * 0.1) * 4;
      const crkH = 20 + Math.sin(c.x * 0.06) * 15;
      ctx.fillRect(crkX, c.topY + 30 + Math.sin(c.x * 0.04) * 20, 2, crkH);
    }
  }

  // 4. Strata lines (diagonal wavy bands)
  for(let i = 0; i < 14; i++){
    const baseY = CT + 25 + i * 27 + Math.sin(i * 0.5 + offset * 0.002) * 4;
    ctx.fillStyle = C(60, 35, 15, 0.08);
    ctx.beginPath();
    for(let x = -20; x < W + 20; x += 4){
      const wave = Math.sin(x * 0.008 + i * 0.6) * 3;
      const tilt = x * 0.004; // slight diagonal
      ctx.fillRect(x, baseY + wave + tilt, 4, 1.5);
    }
  }

  // 5. Ledge outcroppings
  for(let i = 0; i < 4; i++){
    const lx = 80 + i * 240 + Math.sin(i * 1.7 + offset * 0.01) * 30;
    // Find column at this x
    const col = cols.find(c => c.x <= lx && c.x + c.w > lx) || cols[0];
    const ly = col.topY + 40 + Math.sin(i * 0.9) * 20;
    const lw = 50 + Math.sin(i * 0.6) * 15;
    // Ledge top
    ctx.fillStyle = C(160, 100, 45);
    ctx.fillRect(lx, ly, lw, 4);
    // Ledge shadow
    ctx.fillStyle = C(90, 55, 25, 0.3);
    ctx.fillRect(lx - 2, ly + 4, lw + 4, 6);
    // Grass on ledge
    for(let g = 0; g < 5; g++){
      const gx = lx + 5 + g * 10 + Math.sin(g * 2.3) * 3;
      ctx.fillStyle = C(50, 110, 35);
      ctx.fillRect(gx, ly - 4, 2, 6);
      ctx.fillStyle = C(65, 140, 45);
      ctx.fillRect(gx - 1, ly - 6, 2, 6);
    }
  }

  // 6. Hanging vines
  for(let i = 0; i < 18; i++){
    const vx = ((i * 53 + 17 + wOff) % W);
    // Only place where top edge is lower (closer to CT)
    const col = cols.find(c => c.x <= vx && c.x + c.w > vx) || cols[0];
    if(col && col.topY < CT + 10){
      const vLen = 25 + Math.sin(i * 0.9) * 15;
      ctx.fillStyle = C(40, 80, 30, 0.5);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(vx, col.topY);
      ctx.lineTo(vx, col.topY + vLen);
      ctx.stroke();
      // Small leaf
      ctx.fillStyle = C(50, 100, 35, 0.4);
      ctx.beginPath(); ctx.arc(vx, col.topY + vLen - 2, 3, 0, Math.PI*2); ctx.fill();
    }
  }

  // 7. BOTTOM SHADOW GRADIENT
  for(let i = 0; i < 50; i++){
    const t = i / 50;
    const y = CB - 50 + i;
    ctx.fillStyle = C(30 - t * 15, 18 - t * 10, 10 - t * 5, 0.1 + t * 0.3);
    ctx.fillRect(-10, y, W + 20, 1);
  }

  // ═══════════════════════════════════════
  // GRASS ON TOP OF CLIFF
  // ═══════════════════════════════════════
  const grassPositions = [];
  for(let i = 0; i < 80; i++){
    const gx = (i * 13 + 5 + wOff * 0.3) % W;
    const col = cols.find(c => c.x <= gx && c.x + c.w > gx) || cols[0];
    if(col){
      const gy = col.topY;
      // Only place grass where cliff top is higher (col.topY closer to CT)
      if(Math.sin(i * 0.7 + 1.2) > 0){
        grassPositions.push({x:gx, y:gy, h:7 + Math.sin(i * 1.1) * 4, lean:Math.sin(i * 0.5 + 2) * 2});
      }
    }
  }

  // Draw grass blades (background layer - darker)
  for(let g of grassPositions){
    ctx.fillStyle = C(35, 85, 25, 0.5);
    ctx.fillRect(g.x + g.lean - 2, g.y - g.h - 2, 1, g.h + 2);
    ctx.fillRect(g.x + g.lean + 2, g.y - g.h - 1, 1, g.h + 1);
  }

  // Draw grass blades (foreground layer - brighter)
  for(let g of grassPositions){
    const h2 = g.h + 2;
    ctx.fillStyle = C(50, 130, 38, 0.7);
    ctx.fillRect(g.x + g.lean - 3, g.y - h2, 1, h2);
    ctx.fillRect(g.x + g.lean + 3, g.y - h2 + 1, 1, h2 - 1);
    // Tip highlight
    ctx.fillStyle = C(70, 160, 50, 0.4);
    ctx.fillRect(g.x + g.lean - 3, g.y - h2, 1, 3);
  }

  // Foreground grass blades (tallest, on very top of cliff)
  for(let g of grassPositions){
    if(g.h > 9){
      const h3 = g.h + 4;
      ctx.fillStyle = C(60, 145, 42, 0.5);
      ctx.fillRect(g.x + g.lean, g.y - h3, 2, h3);
      ctx.fillStyle = C(45, 110, 32, 0.3);
      ctx.fillRect(g.x + g.lean - 3, g.y - h3 + 3, 2, h3 - 3);
    }
  }

  // ── Ground/terrain indicator at bottom ──
  ctx.fillStyle = C(55,125,35);
  ctx.fillRect(0, 520, W, 3);
  ctx.fillStyle = C(75,55,22);
  ctx.fillRect(0, 523, W, 10);
}

let frame = 0;
function loop(){
  draw(frame * 0.5);
  frame++;
  requestAnimationFrame(loop);
}
loop();
</script></body></html>
